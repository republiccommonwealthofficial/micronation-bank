<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>История операций - Национальный Банк</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loader" class="loader">
        <div class="loader-spinner"></div>
        <div class="loader-text">Национальный Банк Микронации</div>
    </div>

    <div id="app" style="display: none;">
        <nav class="top-nav">
            <div class="nav-container">
                <a href="/" class="logo-link">
                    <img src="/logo.png" alt="Национальный Банк" class="logo">
                </a>
                <div class="nav-links">
                    <a href="/" class="nav-link">Главная</a>
                    <a href="/profile" class="nav-link">Профиль</a>
                    <a href="/cards" class="nav-link">Карты</a>
                    <a href="/transfers" class="nav-link">Переводы</a>
                    <a href="/loans" class="nav-link">Кредиты</a>
                    <a href="/history" class="nav-link active">История</a>
                    <a href="/admin" class="nav-link admin-only">Администрирование</a>
                </div>
            </div>
        </nav>

        <main class="main-container">
            <div class="history-page">
                <h1>История операций</h1>
                <div id="fullTransactionsList" class="transactions-list"></div>
            </div>
        </main>

        <footer class="footer">
            <div class="footer-container">
                <div class="footer-links">
                    <button class="footer-btn" onclick="openSupport()">Техническая поддержка</button>
                    <button class="footer-btn" onclick="openFAQ()">FAQ</button>
                </div>
                <div class="footer-copyright">© 2024 Национальный Банк Микронации</div>
            </div>
        </footer>
    </div>

    <div id="cancellationModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeCancellationModal()">&times;</span>
            <h3>Заявка на отмену перевода</h3>
            <div id="cancellationForm">
                <div class="input-group">
                    <label>Причина отмены</label>
                    <select id="cancellationReason">
                        <option value="">Выберите причину</option>
                        <option value="Ошибочный получатель">Ошибочный получатель</option>
                        <option value="Неверная сумма">Неверная сумма</option>
                        <option value="Мошенническая операция">Подозрение на мошенничество</option>
                        <option value="Дублирование операции">Дублирование операции</option>
                        <option value="Услуга не оказана">Услуга не оказана</option>
                        <option value="Иная причина">Иная причина</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Дополнительный комментарий</label>
                    <textarea id="cancellationComment" rows="3" placeholder="Подробное описание причины..."></textarea>
                </div>
                <button class="btn btn-primary" onclick="submitCancellationRequest()">Отправить заявку</button>
            </div>
        </div>
    </div>

    <div id="alertMessage" class="alert"></div>
    <script src="script.js"></script>
</body>
</html>
