<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>История - Национальный Банк</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div id="loader" class="loader">
        <div class="loader-spinner"></div>
        <div class="loader-text">Национальный Банк Микронации</div>
    </div>

    <div id="app">
        <nav class="top-nav">
            <div class="nav-container">
                <a href="/" class="logo-link">
                    <img src="/logo.png" alt="Логотип" class="logo" onerror="this.style.display='none'">
                </a>
                <div class="nav-links" id="navLinks"></div>
            </div>
        </nav>

        <main class="main-container">
            <h1>История операций</h1>
            <div id="fullTransactionsList" class="transactions-list"></div>
        </main>

        <footer class="footer">
            <div class="footer-links">
                <button class="footer-btn" id="supportBtn">Техподдержка</button>
                <button class="footer-btn" id="faqBtn">FAQ</button>
            </div>
            <div class="footer-copyright">© 2024 Национальный Банк Микронации</div>
        </footer>
    </div>

    <div id="alertMessage" class="alert"></div>
    <script src="/script.js"></script>
</body>
</html>
