<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кредиты - Национальный Банк</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div id="loader" class="loader">
        <div class="loader-spinner"></div>
        <div class="loader-text">Национальный Банк Микронации</div>
    </div>

    <div id="app">
        <nav class="top-nav">
            <div class="nav-container">
                <a href="/" class="logo-link">
                    <img src="/logo.png" alt="Логотип" class="logo" onerror="this.style.display='none'">
                </a>
                <div class="nav-links" id="navLinks"></div>
            </div>
        </nav>

        <main class="main-container">
            <h1>Кредитование</h1>
            <div class="loan-info">
                <p>Максимальная сумма: <strong>10,000 кредитов</strong></p>
                <p>Процентная ставка: <strong>10%</strong></p>
            </div>
            <div id="activeLoanInfo" class="loan-status"></div>
            <div class="loan-application">
                <h2>Подать заявку</h2>
                <div class="form-group">
                    <label>Сумма</label>
                    <input type="number" id="loanAmount" placeholder="1 - 10000">
                </div>
                <div class="form-group">
                    <label>Цель</label>
                    <input type="text" id="loanPurpose" placeholder="Цель кредита">
                </div>
                <button class="btn btn-primary" id="submitLoanBtn">Подать заявку</button>
                <button class="btn btn-outline" id="repayLoanBtn">Погасить кредит</button>
            </div>
        </main>

        <footer class="footer">
            <div class="footer-links">
                <button class="footer-btn" id="supportBtn">Техподдержка</button>
                <button class="footer-btn" id="faqBtn">FAQ</button>
            </div>
            <div class="footer-copyright">© 2024 Национальный Банк Микронации</div>
        </footer>
    </div>

    <div id="alertMessage" class="alert"></div>
    <script src="/script.js"></script>
</body>
</html>
