<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кредиты - Национальный Банк</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loader" class="loader">
        <div class="loader-spinner"></div>
        <div class="loader-text">Национальный Банк Микронации</div>
    </div>

    <div id="app" style="display: none;">
        <nav class="top-nav">
            <div class="nav-container">
                <a href="/" class="logo-link">
                    <img src="/logo.png" alt="Национальный Банк" class="logo">
                </a>
                <div class="nav-links">
                    <a href="/" class="nav-link">Главная</a>
                    <a href="/profile.html" class="nav-link">Профиль</a>
                    <a href="/cards.html" class="nav-link">Карты</a>
                    <a href="/transfers.html" class="nav-link">Переводы</a>
                    <a href="/loans.html" class="nav-link active">Кредиты</a>
                    <a href="/history.html" class="nav-link">История</a>
                    <a href="/admin.html" class="nav-link admin-only">Администрирование</a>
                </div>
            </div>
        </nav>

        <main class="main-container">
            <div class="loans-page">
                <h1>Кредитование</h1>
                
                <div class="loan-info">
                    <p>Максимальная сумма: <strong>10,000 кредитов</strong></p>
                    <p>Процентная ставка: <strong>10% годовых</strong></p>
                    <p>Срок кредитования: <strong>12 месяцев</strong></p>
                </div>
                
                <div id="activeLoanInfo" class="loan-status"></div>
                
                <div class="loan-application">
                    <h2>Подать заявку на кредит</h2>
                    <div class="input-group">
                        <label>Сумма кредита</label>
                        <input type="number" id="loanAmount" placeholder="1 - 10000">
                    </div>
                    <div class="input-group">
                        <label>Цель кредита</label>
                        <input type="text" id="loanPurpose" placeholder="Укажите цель получения кредита">
                    </div>
                    <button class="btn btn-primary" onclick="submitLoanApplication()">Подать заявку</button>
                    <button class="btn btn-outline" onclick="repayLoan()">Погасить кредит</button>
                </div>
            </div>
        </main>

        <footer class="footer">
            <div class="footer-container">
                <div class="footer-links">
                    <button class="footer-btn" onclick="openSupport()">Техническая поддержка</button>
                    <button class="footer-btn" onclick="openFAQ()">FAQ</button>
                </div>
                <div class="footer-copyright">© 2024 Национальный Банк Микронации</div>
            </div>
        </footer>
    </div>

    <div id="alertMessage" class="alert"></div>
    <script src="script.js"></script>
</body>
</html>
