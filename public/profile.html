<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль - Национальный Банк</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div id="loader" class="loader">
        <div class="loader-spinner"></div>
        <div class="loader-text">Национальный Банк Микронации</div>
    </div>

    <div id="app">
        <nav class="top-nav">
            <div class="nav-container">
                <a href="/" class="logo-link">
                    <img src="/logo.png" alt="Логотип" class="logo" onerror="this.style.display='none'">
                </a>
                <div class="nav-links" id="navLinks"></div>
            </div>
        </nav>

        <main class="main-container">
            <div class="profile-container">
                <div class="profile-header">
                    <h1>Личный кабинет</h1>
                    <div class="client-id">Клиент № <span id="userId"></span></div>
                </div>
                <div class="profile-content">
                    <div class="info-section">
                        <h3>Персональные данные</h3>
                        <div class="info-grid">
                            <div class="info-item"><span class="info-label">Полное имя</span><span class="info-value" id="fullName"></span></div>
                            <div class="info-item"><span class="info-label">Паспорт</span><span class="info-value" id="passport"></span></div>
                            <div class="info-item"><span class="info-label">Дата рождения</span><span class="info-value" id="birthDate"></span></div>
                            <div class="info-item"><span class="info-label">Email</span><span class="info-value" id="email"></span></div>
                            <div class="info-item"><span class="info-label">Дата регистрации</span><span class="info-value" id="createdAt"></span></div>
                        </div>
                    </div>
                    <div class="account-actions">
                        <button class="btn btn-danger" id="logoutBtn">Выйти из аккаунта</button>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <div class="footer-links">
                <button class="footer-btn" id="supportBtn">Техподдержка</button>
                <button class="footer-btn" id="faqBtn">FAQ</button>
            </div>
            <div class="footer-copyright">© 2024 Национальный Банк Микронации</div>
        </footer>
    </div>

    <div id="alertMessage" class="alert"></div>
    <script src="/script.js"></script>
</body>
</html>
