<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Переводы - Национальный Банк</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div id="loader" class="loader">
        <div class="loader-spinner"></div>
        <div class="loader-text">Национальный Банк Микронации</div>
    </div>

    <div id="app">
        <nav class="top-nav">
            <div class="nav-container">
                <a href="/" class="logo-link">
                    <img src="/logo.png" alt="Логотип" class="logo" onerror="this.style.display='none'">
                </a>
                <div class="nav-links" id="navLinks"></div>
            </div>
        </nav>

        <main class="main-container">
            <div class="balance-card-small">
                <div class="balance-label">Доступно для перевода</div>
                <div class="balance-amount" id="transferBalance">0.00</div>
                <div class="balance-currency">кредитов</div>
            </div>
            
            <div class="transfer-form-container">
                <h2>Новый перевод</h2>
                <div class="form-group">
                    <label>Получатель</label>
                    <select id="recipientSelect">
                        <option value="">Выберите получателя</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Сумма</label>
                    <input type="number" id="transferAmount" placeholder="0.00" step="0.01">
                </div>
                <div class="form-group">
                    <label>Назначение</label>
                    <input type="text" id="transferDescription" placeholder="Необязательно">
                </div>
                <button class="btn btn-primary" id="makeTransferBtn">Выполнить перевод</button>
            </div>
            
            <div class="recent-transfers">
                <h2>Последние операции</h2>
                <div id="recentTransactionsList" class="transactions-list"></div>
            </div>
        </main>

        <footer class="footer">
            <div class="footer-links">
                <button class="footer-btn" id="supportBtn">Техподдержка</button>
                <button class="footer-btn" id="faqBtn">FAQ</button>
            </div>
            <div class="footer-copyright">© 2024 Национальный Банк Микронации</div>
        </footer>
    </div>

    <div id="cancellationModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" id="closeCancellationBtn">&times;</span>
            <h3>Отмена перевода</h3>
            <div class="form-group">
                <label>Причина</label>
                <select id="cancellationReason">
                    <option value="">Выберите причину</option>
                    <option value="Ошибочный получатель">Ошибочный получатель</option>
                    <option value="Неверная сумма">Неверная сумма</option>
                    <option value="Мошенничество">Мошенничество</option>
                </select>
            </div>
            <div class="form-group">
                <label>Комментарий</label>
                <textarea id="cancellationComment" rows="3"></textarea>
            </div>
            <button class="btn btn-primary" id="submitCancellationBtn">Отправить</button>
        </div>
    </div>

    <div id="alertMessage" class="alert"></div>
    <script src="/script.js"></script>
</body>
</html>
